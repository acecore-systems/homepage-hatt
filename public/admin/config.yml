# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms@0.166.0/schema/sveltia-cms.json

backend:
  name: github
  repo: acecore-systems/homepage-hatt
  branch: main
  base_url: https://sveltia-cms-auth.sparkling-tree-7cef.workers.dev
  auth_methods: [oauth]
  commit_messages:
    create: 'cms: create {{collection}} "{{slug}}"'
    update: 'cms: update {{collection}} "{{slug}}"'
    delete: 'cms: delete {{collection}} "{{slug}}"'
    uploadMedia: 'cms: upload "{{path}}"'
    deleteMedia: 'cms: delete media "{{path}}"'

publish_mode: editorial_workflow

media_folder: /public/uploads/hatt
public_folder: /uploads/hatt

collections:
  - name: blog
    label: ブログ
    label_singular: ブログ記事
    description: 絵・小説・モデリングに関する記事を編集します。
    icon: article
    folder: src/content/blog
    slug: '{{fields.slug}}'
    preview_path: blog/article/{{slug}}/
    summary: '{{title}} - {{date}}'
    thumbnail: image
    sortable_fields: [date, lastUpdated, title, slug, author]
    fields:
      - name: title
        label: タイトル
        widget: string
      - name: slug
        label: URLスラッグ
        widget: string
        hint: 半角英数字、ハイフン、アンダースコアで入力します。
        pattern:
          - '^[a-z0-9][a-z0-9_-]*$'
          - 半角英数字で始まるURL用文字列を入力してください。
      - name: description
        label: 概要
        widget: text
      - name: date
        label: 公開日
        hint: 訪問者の表示時刻（日本時間）で判定します。未来日時の記事は、時刻到達後に一覧・記事本文がブラウザ側で表示されます。
        widget: datetime
        format: YYYY-MM-DDTHH:mm
        default: '{{now}}'
      - name: lastUpdated
        label: 最終更新日
        widget: datetime
        format: YYYY-MM-DDTHH:mm
        required: false
      - name: tags
        label: タグ
        widget: relation
        collection: tags
        value_field: id
        display_fields: ['{{name}} ({{id}})']
        search_fields: [name, id]
        multiple: true
        required: false
      - name: author
        label: 著者
        widget: relation
        collection: authors
        value_field: id
        display_fields: ['{{name}} ({{id}})']
        search_fields: [name, id]
      - name: image
        label: 画像
        widget: image
        required: false
      - name: legacySlugs
        label: 旧URLスラッグ
        widget: list
        required: false
        hint: 旧記事URLを200で残したい場合だけ追加します。
        field:
          name: slug
          label: 旧スラッグ
          widget: string
      - name: callout
        label: 補足コールアウト
        widget: object
        required: false
        collapsed: true
        fields:
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: text
            label: 本文
            widget: text
            required: false
          - name: tone
            label: 色
            widget: select
            options: [cyan, ember, mint, pollen]
            default: cyan
            required: false
      - name: timeline
        label: タイムライン
        widget: object
        required: false
        collapsed: true
        fields:
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: items
            label: 項目
            widget: list
            required: false
            fields:
              - name: title
                label: タイトル
                widget: string
              - name: text
                label: 説明
                widget: text
                required: false
              - name: date
                label: 日付・補足
                widget: string
                required: false
      - name: compareTable
        label: 比較表
        widget: object
        required: false
        collapsed: true
        fields:
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: columns
            label: 列
            widget: list
            required: false
            field:
              name: column
              label: 列名
              widget: string
          - name: rows
            label: 行
            widget: list
            required: false
            fields:
              - name: label
                label: 行見出し
                widget: string
                required: false
              - name: cells
                label: セル
                widget: list
                required: false
                field:
                  name: cell
                  label: セル
                  widget: string
      - name: checklist
        label: チェックリスト
        widget: object
        required: false
        collapsed: true
        fields:
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: items
            label: 項目
            widget: list
            required: false
            field:
              name: item
              label: 項目
              widget: string
      - name: gallery
        label: ギャラリー
        widget: object
        required: false
        collapsed: true
        fields:
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: images
            label: 画像
            widget: list
            required: false
            fields:
              - name: src
                label: 画像
                widget: image
              - name: alt
                label: 代替テキスト
                widget: string
                required: false
              - name: caption
                label: キャプション
                widget: string
                required: false
      - name: youtube
        label: YouTube埋め込み
        widget: object
        required: false
        collapsed: true
        fields:
          - name: url
            label: YouTube URL
            widget: string
            required: false
          - name: title
            label: タイトル
            widget: string
            required: false
          - name: caption
            label: キャプション
            widget: string
            required: false
      - name: faq
        label: FAQ
        widget: object
        required: false
        collapsed: true
        fields:
          - name: title
            label: 見出し
            widget: string
            required: false
          - name: items
            label: 質問
            widget: list
            required: false
            fields:
              - name: question
                label: 質問
                widget: string
              - name: answer
                label: 回答
                widget: text
      - name: linkCards
        label: リンクカード
        widget: list
        required: false
        fields:
          - name: label
            label: ラベル
            widget: string
          - name: href
            label: URL
            widget: string
          - name: description
            label: 説明
            widget: text
            required: false
      - name: pullQuote
        label: 引用
        widget: object
        required: false
        collapsed: true
        fields:
          - name: quote
            label: 引用文
            widget: text
            required: false
          - name: source
            label: 出典・補足
            widget: string
            required: false
      - name: body
        label: 本文
        widget: markdown

  - name: art
    label: 絵
    label_singular: 絵
    description: X投稿や手元の画像を、絵ギャラリーとして編集します。
    icon: image
    folder: src/content/art
    format: json
    extension: json
    identifier_field: title
    slug: '{{fields.id}}'
    preview_path: art/
    summary: '{{title}} - {{date}}'
    thumbnail: image
    sortable_fields: [date, title, order, featured]
    fields:
      - name: id
        label: ID
        widget: string
        hint: 半角英数字、ハイフン、アンダースコアで入力します。
        pattern:
          - '^[a-z0-9][a-z0-9_-]*$'
          - 半角英数字で始まるIDを入力してください。
      - name: title
        label: タイトル
        widget: string
      - name: description
        label: 説明
        widget: text
        required: false
      - name: date
        label: 投稿日
        widget: datetime
        type: date
        format: YYYY-MM-DD
        default: '{{now}}'
      - name: image
        label: 画像
        widget: image
      - name: alt
        label: 代替テキスト
        widget: string
        required: false
      - name: sourceUrl
        label: 投稿URL
        widget: string
        required: false
        hint: Xなど、元投稿がある場合に入れます。
      - name: sourceLabel
        label: 投稿元ラベル
        widget: string
        default: X
        required: false
      - name: tags
        label: タグ
        widget: list
        required: false
        field:
          name: tag
          label: タグ
          widget: string
      - name: order
        label: 表示順
        widget: number
        value_type: int
        default: 100
        required: false
      - name: featured
        label: 注目表示
        widget: boolean
        default: false

  - name: modeling
    label: モデリング
    label_singular: モデリング項目
    description: VRChat向けアバター、ギミック、商品リンク、動画リンクを編集します。
    icon: deployed_code
    folder: src/content/modeling
    format: json
    extension: json
    identifier_field: title
    slug: '{{fields.title}}'
    preview_path: modeling/
    summary: '{{title}} - {{kind}}'
    thumbnail: image
    sortable_fields: [title, kind, featured]
    fields:
      - name: title
        label: タイトル
        widget: string
      - name: kind
        label: 種別
        widget: select
        options: [オリジナル3Dアバター, ギミック, アクセサリー, ラインアップ]
      - name: summary
        label: 概要
        widget: text
      - name: order
        label: 表示順
        widget: number
        value_type: int
        default: 100
        required: false
      - name: priceLabel
        label: 価格表示
        widget: string
        required: false
      - name: features
        label: 主な特徴
        widget: list
        required: false
        field:
          name: feature
          label: 特徴
          widget: string
      - name: specs
        label: スペック・商品情報
        widget: list
        required: false
        field:
          name: spec
          label: 項目
          widget: string
      - name: requirements
        label: 対応環境・前提
        widget: list
        required: false
        field:
          name: requirement
          label: 項目
          widget: string
      - name: boothUrl
        label: BOOTH URL
        widget: string
        required: false
      - name: youtubeUrl
        label: YouTube URL
        widget: string
        required: false
      - name: xUrl
        label: X URL
        widget: string
        required: false
      - name: tryOnUrl
        label: 試着ワールド URL
        widget: string
        required: false
      - name: image
        label: 画像
        widget: image
        required: false
      - name: related
        label: 関連リンク
        widget: list
        required: false
        fields:
          - name: label
            label: ラベル
            widget: string
          - name: href
            label: URL
            widget: string
      - name: featured
        label: 注目表示
        widget: boolean
        default: false

  - name: products
    label: 商品
    label_singular: 商品
    description: ショップに並べる絵・小説・3D作品・グッズの商品情報を編集します。
    icon: shopping_bag
    folder: src/content/products
    format: json
    extension: json
    identifier_field: title
    slug: '{{fields.slug}}'
    preview_path: shop/{{slug}}/
    summary: '{{title}} - {{priceJpy}}円'
    thumbnail: images.0.src
    sortable_fields: [order, title, category, status, priceJpy]
    fields:
      - name: slug
        label: URLスラッグ
        widget: string
        pattern:
          - '^[a-z0-9][a-z0-9_-]*$'
          - 半角英数字で始まるURL用文字列を入力してください。
      - name: title
        label: 商品名
        widget: string
      - name: category
        label: カテゴリ
        widget: select
        options:
          - { label: 絵, value: picture }
          - { label: 小説, value: novel }
          - { label: 3D作品, value: modeling }
          - { label: グッズ, value: goods }
      - name: summary
        label: 概要
        widget: text
      - name: description
        label: 説明
        widget: text
        required: false
      - name: images
        label: 商品画像
        widget: list
        required: false
        fields:
          - name: src
            label: 画像
            widget: image
          - name: alt
            label: 代替テキスト
            widget: string
            required: false
          - name: caption
            label: キャプション
            widget: string
            required: false
      - name: priceJpy
        label: 価格（円）
        widget: number
        value_type: int
        min: 0
      - name: status
        label: 販売状態
        widget: select
        options:
          - { label: 下書き, value: draft }
          - { label: 販売中, value: published }
          - { label: 売り切れ, value: sold_out }
        default: draft
      - name: fulfillmentType
        label: 受け渡し種別
        widget: select
        options:
          - { label: デジタル配布, value: digital }
          - { label: 手動納品, value: manual }
          - { label: 物理発送, value: physical }
      - name: stock
        label: 在庫数
        widget: number
        value_type: int
        min: 0
        default: 0
      - name: maxQuantity
        label: 1注文あたりの最大数量
        widget: number
        value_type: int
        min: 1
        default: 1
      - name: r2ObjectKey
        label: R2オブジェクトキー
        hint: デジタル配布商品のみ設定します。公開カタログには出しません。
        widget: string
        required: false
      - name: shippingProfileId
        label: 配送プロファイルID
        hint: 物理発送商品のみ、ショップ設定の配送プロファイルIDを入力します。
        widget: string
        required: false
      - name: taxCode
        label: Stripe Tax Code
        widget: string
        required: false
      - name: externalUrl
        label: 外部販売URL
        hint: BOOTHなど移行期に併記する外部ページです。
        widget: string
        required: false
      - name: features
        label: 特徴
        widget: list
        required: false
        field:
          name: feature
          label: 特徴
          widget: string
      - name: order
        label: 表示順
        widget: number
        value_type: int
        default: 100
      - name: featured
        label: 注目表示
        widget: boolean
        default: false

  - name: tags
    label: タグ
    label_singular: タグ
    description: ブログ記事の分類を編集します。
    icon: sell
    folder: src/content/tags
    format: json
    extension: json
    identifier_field: id
    slug: '{{fields.id}}'
    summary: '{{name}} ({{id}})'
    sortable_fields: [name, id, slug]
    fields:
      - name: id
        label: ID
        widget: string
      - name: name
        label: 名前
        widget: string
      - name: slug
        label: スラッグ
        widget: string
      - name: description
        label: 説明
        widget: text
        required: false

  - name: authors
    label: 著者
    label_singular: 著者
    description: 著者プロフィールと外部リンクを編集します。
    icon: person
    folder: src/content/authors
    format: json
    extension: json
    identifier_field: id
    slug: '{{fields.id}}'
    summary: '{{name}} ({{id}})'
    thumbnail: avatar
    sortable_fields: [name, id]
    fields:
      - name: id
        label: ID
        widget: string
      - name: name
        label: 名前
        widget: string
      - name: bio
        label: プロフィール
        widget: text
      - name: avatar
        label: アバター
        widget: image
        required: false
      - name: links
        label: 外部リンク
        widget: list
        required: false
        fields:
          - name: label
            label: ラベル
            widget: string
          - name: href
            label: URL
            widget: string

  - name: site
    label: サイト設定
    icon: settings
    format: json
    files:
      - name: main
        label: 基本設定
        file: src/content/site/main.json
        fields:
          - name: name
            label: サイト名
            widget: string
          - name: description
            label: 説明
            widget: text
          - name: icon
            label: アイコン
            widget: image
          - name: cover
            label: カバー画像
            widget: image
          - name: adsenseClientId
            label: AdSense Client ID
            widget: string
            required: false
          - name: turnstileSiteKey
            label: Turnstile Site Key
            widget: string
            required: false
            hint: コメント投稿のCloudflare Turnstile公開キーです。secret keyはCloudflare Pagesの環境変数に設定します。
          - name: adsenseSlotId
            label: AdSense List Slot ID
            widget: string
            required: false
          - name: adsenseInlineSlotId
            label: AdSense Inline Slot ID
            widget: string
            required: false
          - name: headerLinks
            label: ヘッダーリンク
            widget: list
            fields:
              - name: label
                label: ラベル
                widget: string
              - name: href
                label: URL
                widget: string
          - name: socialLinks
            label: 外部リンク
            widget: list
            fields:
              - name: label
                label: ラベル
                widget: string
              - name: href
                label: URL
                widget: string
          - name: homePillars
            label: トップ3本柱
            widget: list
            fields:
              - name: id
                label: ID
                widget: string
              - name: label
                label: ラベル
                widget: string
              - name: eyebrow
                label: 補助テキスト
                widget: string
              - name: title
                label: タイトル
                widget: string
              - name: description
                label: 説明
                widget: text
              - name: href
                label: URL
                widget: string
              - name: cta
                label: CTA
                widget: string
              - name: image
                label: 画像
                widget: image
              - name: tone
                label: 色
                widget: select
                options: [cyan, ember, mint]

  - name: shopSettings
    label: ショップ設定
    icon: store
    format: json
    files:
      - name: main
        label: 基本設定
        file: src/content/shop-settings/main.json
        fields:
          - name: id
            label: ID
            widget: hidden
            default: main
          - name: enabled
            label: ショップを表示する
            widget: boolean
            default: true
          - name: checkoutEnabled
            label: 決済を有効にする
            hint: 特商法、返品、プライバシー、利用条件の文面が揃うまで有効にしないでください。
            widget: boolean
            default: false
          - name: currency
            label: 通貨
            widget: select
            options: [JPY]
            default: JPY
          - name: stripeTaxEnabled
            label: Stripe Taxを有効にする
            widget: boolean
            default: true
          - name: stripeConnectedAccountId
            label: Stripe Connect販売者アカウントID
            hint: acct_ から始まるconnected account ID。未設定だと決済は有効になりません。
            widget: string
            required: false
          - name: platformFeeBasisPoints
            label: プラットフォーム手数料率（bps）
            hint: 1000=10%。0なら率の手数料なし。
            widget: number
            value_type: int
            min: 0
            max: 9999
            default: 0
          - name: platformFeeFixedJpy
            label: プラットフォーム固定手数料（円）
            hint: 1注文ごとに追加で差し引く手数料。不要なら0。
            widget: number
            value_type: int
            min: 0
            default: 0
          - name: allowedCountries
            label: 配送可能国
            widget: list
            default: [JP]
            field:
              name: country
              label: 国コード
              widget: string
          - name: shippingProfiles
            label: 配送プロファイル
            widget: list
            required: false
            fields:
              - name: id
                label: ID
                widget: string
              - name: label
                label: 表示名
                widget: string
              - name: description
                label: 説明
                widget: string
                required: false
              - name: amountJpy
                label: 送料（円）
                widget: number
                value_type: int
                min: 0
                default: 0
              - name: freeAboveJpy
                label: 送料無料になる注文金額（円）
                widget: number
                value_type: int
                min: 0
                required: false
              - name: countries
                label: 対応国
                widget: list
                default: [JP]
                field:
                  name: country
                  label: 国コード
                  widget: string
          - name: businessName
            label: 事業者名
            widget: string
            required: false
          - name: sellerName
            label: 販売責任者
            widget: string
            required: false
          - name: sellerAddress
            label: 所在地
            widget: text
            required: false
          - name: sellerPhone
            label: 電話番号
            widget: string
            required: false
          - name: sellerEmail
            label: メールアドレス
            widget: string
            required: false
          - name: contactUrl
            label: 問い合わせURL
            widget: string
            required: false
          - name: returnsPolicy
            label: 返品・キャンセルポリシー
            widget: text
            required: false
          - name: privacyPolicy
            label: プライバシーポリシー
            widget: text
            required: false
          - name: terms
            label: 利用条件
            widget: text
            required: false

  - name: campaigns
    label: キャンペーン通知
    label_singular: キャンペーン通知
    description: サイト上部の告知バナーや、ページ内のキャンペーン通知を編集します。
    icon: campaign
    folder: src/content/campaigns
    format: json
    extension: json
    identifier_field: id
    slug: '{{fields.id}}'
    summary: '{{title}} - {{placement}}'
    sortable_fields: [order, title, placement, enabled]
    fields:
      - name: id
        label: ID
        widget: string
        pattern:
          - '^[a-z0-9][a-z0-9_-]*$'
          - 半角英数字で始まるIDを入力してください。
      - name: enabled
        label: 表示する
        widget: boolean
        default: false
      - name: kind
        label: 種別
        widget: select
        options:
          - { label: トップ告知バナー, value: banner }
          - { label: ページ内キャンペーン通知, value: notice }
        default: notice
      - name: placement
        label: 表示位置
        widget: select
        options:
          - { label: サイト上部, value: global }
          - { label: トップページ・ヒーロー下, value: home-after-hero }
          - { label: ブログ一覧・ヒーロー下, value: blog-after-hero }
          - { label: 記事ページ・見出し下, value: blog-article-after-header }
          - { label: モデリング・ヒーロー下, value: modeling-after-hero }
          - { label: プロフィール・ヒーロー下, value: profile-after-hero }
      - name: title
        label: タイトル
        widget: string
      - name: body
        label: 本文
        widget: text
        required: false
      - name: href
        label: リンクURL
        widget: string
        required: false
      - name: ctaLabel
        label: ボタン文言
        widget: string
        required: false
      - name: icon
        label: アイコン
        widget: select
        required: false
        options:
          - { label: 告知, value: i-lucide-megaphone }
          - { label: 星, value: i-lucide-star }
          - { label: 制作, value: i-lucide-sparkles }
